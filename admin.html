<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestion de Usuarios</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Panel de Administracion</h1>
    <div id="usuario-info">
      <a class="header-link" href="kanban.html">Volver al tablero</a>
      <button onclick="cerrarSesion()">Cerrar sesion</button>
    </div>
  </header>

  <main class="admin-panel">
    <div class="admin-header">
      <h2>Gestion de usuarios</h2>
      <p>Administra usuarios registrados, roles y accesos creados por el administrador.</p>
      <button class="btn-admin-primario" onclick="abrirModalAgregarUsuario()">Agregar usuario</button>
    </div>

    <section class="admin-section">
      <div class="admin-controles">
        <input type="text" id="buscar-usuario" placeholder="Buscar por nombre o correo..." oninput="filtrarUsuariosAdmin()">
        <select id="filtro-rol-admin" onchange="filtrarUsuariosAdmin()">
          <option value="todos">Todos los roles</option>
          <option value="administrador">Administrador</option>
          <option value="lider">Lider</option>
          <option value="miembro">Miembro</option>
          <option value="invitado">Invitado</option>
        </select>
      </div>
      <div class="tabla-admin-wrapper">
        <table class="tabla-admin">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Ultimo acceso</th>
              <th>Creacion</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="lista-usuarios"></tbody>
        </table>
      </div>
    </section>

  </main>

  <div id="modal-agregar-usuario" class="modal oculto">
    <div class="modal-contenido">
      <h2>Agregar usuario</h2>

      <label>Correo corporativo</label>
      <input type="email" id="nuevo-usuario-email" placeholder="usuario@kg.com.pe">

      <label>Rol</label>
      <select id="nuevo-usuario-rol">
        <option value="miembro">Miembro</option>
        <option value="lider">Lider</option>
        <option value="invitado">Invitado</option>
        <option value="administrador">Administrador</option>
      </select>

      <div class="botones-modal">
        <button onclick="crearUsuarioAdmin()">Crear usuario</button>
        <button onclick="cerrarModalAgregarUsuario()">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
